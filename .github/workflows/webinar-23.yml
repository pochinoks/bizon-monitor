name: Webinar 23:00 UTC

on:
  schedule:
    - cron: '58 22 * * *'  # 22:58 UTC = за 2 мин до 23:00 (NY 19:00 лето)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      SID: ${{ secrets.BIZON_SID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node index.js ai_extra_income
