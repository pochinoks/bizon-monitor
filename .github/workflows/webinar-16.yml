name: Webinar 16:00 UTC

on:
  schedule:
    - cron: '58 15 * * *'  # 15:58 UTC = за 2 мин до 16:00 (NY 12:00 лето)
  workflow_dispatch:        # ручной запуск для теста

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 150   # 2.5 часа максимум
    env:
      BIZON_EMAIL:    ${{ secrets.BIZON_EMAIL }}
      BIZON_PASSWORD: ${{ secrets.BIZON_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm install
      - run: node index.js ai_avatar_challenge ai_avatar_challenge2 ai_avatar_challenge3 ai_extra_income
