name: Webinar 23:00 UTC

on:
  schedule:
    - cron: '58 22 * * *'  # 22:58 UTC = за 2 мин до 23:00 (NY 19:00 лето)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      BIZON_EMAIL:         ${{ secrets.BIZON_EMAIL }}
      BIZON_PASSWORD:      ${{ secrets.BIZON_PASSWORD }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm install
      - run: node index.js ai_extra_income
